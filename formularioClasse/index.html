<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelo</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="container">
        <h1 class="textColor">Formulario de cadastro</h1>
        <ul class="textColor">
            <li>Nenhum campo pode estar vazio</li>
            <li>Usuário só poderá conter letras e/ou números</li>
            <li>Usuário deverá ter entre 3 e 12 caracteres</li>
            <li>Senha precisa ter entre 6 e 12 caracteres</li>
        </ul>
        <form action="/" method="POST" class="formulario">
            <label for="nome" class="textColor">Nome</label>
            <input type="text" id="nome" class="nome validar">

            <label for="sobrenome" class="textColor">Sobrenome</label>
            <input type="text" id="sobrenome" class="sobrenome validar">

            <label for="cpf" class="textColor">CPF</label>
            <input type="text" id="cpf" class="cpf validar">

            <label for="usuario" class="textColor">Usuário</label>
            <input type="text" id="usuario" class="usuario validar">

            <label for="senha" class="textColor">Senha</label>
            <input type="password" id="senha" class="senha validar">

            <label for="repetir-senha" class="textColor">Repetir Senha</label>
            <input type="password" id="repetir-senha" class="repetir-senha validar">

            <button type="submit" class="textColor">Enviar</button>
        </form>

    </section>

    <script src="./assets/js/validaCPF.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
